[alembic]
# Path to the migrations directory, relative to this file.
script_location = migrations

# sqlalchemy.url is set programmatically in migrations/env.py from application
# settings so it never has to be duplicated here.
# sqlalchemy.url =

# Adds api/ to sys.path so `life_dashboard` is importable when the editable
# install is not active (e.g. running alembic directly inside the container).
prepend_sys_path = src

version_path_separator = os


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
