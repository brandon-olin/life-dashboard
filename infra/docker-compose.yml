networks:
  life-dashboard:
    external: true
    name: life-dashboard

volumes:
  caddy_data:
  caddy_logs:

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: life-dashboard-api:latest
    restart: unless-stopped
    networks:
      - life-dashboard
    # Caddy proxies; bind only to loopback on the host so the port is not
    # directly reachable without going through Caddy.
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on: []   # postgres-1 is external; healthcheck handles readiness

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - life-dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Tailscale stores certs here on Synology DSM.
      # Refresh with: sudo tailscale cert YOUR_NAS.tailnet-name.ts.net
      - /var/packages/Tailscale/var/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
