networks:
  life-dashboard:
    external: true
    name: life-dashboard

volumes: {}

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: life-dashboard-api:latest
    restart: unless-stopped
    networks:
      - life-dashboard
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on: []   # postgres-1 is external; healthcheck handles readiness

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        # Next.js uses this server-side to proxy /api/* to the API container.
        API_URL: http://api:8000
    image: life-dashboard-web:latest
    restart: unless-stopped
    networks:
      - life-dashboard
    ports:
      # Exposed on the host so tailscale serve can reach it.
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
    depends_on:
      - api
